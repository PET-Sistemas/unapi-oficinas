<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Guia GOV.BR - UnAPI UFMS</title>
    <link rel="stylesheet" href="../css/base.css" />
    <link rel="stylesheet" href="../css/gov.css" />
  </head>
  <body class="gov-page">
    <a class="btn-voltar-home" href="../">← Home</a>

    <main class="gov-shell" aria-label="Guia visual de cadastro GOV.BR">
      <section id="mockup-content" class="gov-screen" aria-label="Tela demonstrativa GOV.BR"></section>

      <nav class="step-controls" aria-label="Controles da apresentação">
        <button type="button" id="prev-step" class="control-button secondary">Anterior</button>
        <div class="step-summary">
          <span id="step-indicator" class="step-indicator" aria-live="polite"></span>
          <strong id="step-title"></strong>
        </div>
        <button type="button" id="next-step" class="control-button primary">Próximo</button>
      </nav>
    </main>

    <script src="../js/gov.js" defer></script>
  </body>
</html>
